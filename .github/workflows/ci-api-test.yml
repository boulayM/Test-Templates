name: CI Api-Test

on:
  push:
    branches: ["main", "master"]
    paths:
      - "Api-Test/**"
      - ".github/workflows/ci-api-test.yml"
  pull_request:
    branches: ["main", "master"]
    paths:
      - "Api-Test/**"
      - ".github/workflows/ci-api-test.yml"
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Api-Test

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: MabDev2025
          POSTGRES_DB: test-api
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d test-api"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "echo 'db.runCommand({ ping: 1 })' | mongosh mongodb://localhost:27017/test --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Api-Test/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prepare test environment
        run: |
          cat > .env.test <<'EOF'
          DATABASE_URL="postgresql://postgres:MabDev2025@localhost:5432/test-api?schema=public"
          ACCESS_TOKEN_SECRET="test_access_secret"
          REFRESH_TOKEN_SECRET="test_refresh_secret"
          ACCESS_TOKEN_EXPIRE=15m
          REFRESH_TOKEN_EXPIRE=7d
          NODE_ENV="test"
          ADMIN_EMAIL="admin@example.com"
          ADMIN_PASSWORD="Admin123!"
          MONGODB_URI_TEST="mongodb://localhost:27017/auditlogs_test"
          EOF

      - name: Run CI checks
        run: npm run ci:check
