name: CI Api-Test

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Api-Test

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: MabDev2025
          POSTGRES_DB: test-api
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d test-api"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "echo 'db.runCommand({ ping: 1 })' | mongosh mongodb://localhost:27017/test --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Api-Test changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api:
              - 'Api-Test/**'
              - '.github/workflows/ci-api-test.yml'

      - name: Setup Node.js
        if: steps.filter.outputs.api == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Api-Test/package-lock.json

      - name: Install dependencies
        if: steps.filter.outputs.api == 'true' || github.event_name == 'workflow_dispatch'
        run: npm ci

      - name: Prepare test environment
        if: steps.filter.outputs.api == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          cat > .env.test <<'EOF'
          DATABASE_URL="postgresql://postgres:MabDev2025@localhost:5432/test-api?schema=public"
          ACCESS_TOKEN_SECRET="test_access_secret"
          REFRESH_TOKEN_SECRET="test_refresh_secret"
          ACCESS_TOKEN_EXPIRE=15m
          REFRESH_TOKEN_EXPIRE=7d
          NODE_ENV="test"
          ADMIN_EMAIL="admin@example.com"
          ADMIN_PASSWORD="Admin123!"
          MONGODB_URI_TEST="mongodb://localhost:27017/auditlogs_test"
          EOF

      - name: Run CI checks
        if: steps.filter.outputs.api == 'true' || github.event_name == 'workflow_dispatch'
        run: npm run ci:check

      - name: Skip unchanged Api-Test
        if: steps.filter.outputs.api != 'true' && github.event_name != 'workflow_dispatch'
        run: echo "No Api-Test changes detected; required check passes without running the suite."
