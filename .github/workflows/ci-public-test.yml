name: CI Public-Test

on:
  push:
    branches: ["main", "master"]
    paths:
      - "Public-Test/**"
      - ".github/workflows/ci-public-test.yml"
  pull_request:
    branches: ["main", "master"]
    paths:
      - "Public-Test/**"
      - ".github/workflows/ci-public-test.yml"
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Public-Test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Public-Test/package-lock.json

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: npm ci

      - name: Run CI checks
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: npm run ci:check
