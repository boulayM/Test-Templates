name: CI Public-Test

on:
  push:
    branches: ["main", "master"]
    paths:
      - "Public-Test/**"
      - ".github/workflows/ci-public-test.yml"
  pull_request:
    branches: ["main", "master"]
    paths:
      - "Public-Test/**"
      - ".github/workflows/ci-public-test.yml"
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Public-Test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Public-Test/package-lock.json

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: npm ci

      - name: Configure Chrome no-sandbox wrapper
        run: |
          cat > /tmp/chrome-no-sandbox <<'EOF'
          #!/usr/bin/env bash
          "${{ steps.setup-chrome.outputs.chrome-path }}" --no-sandbox --disable-dev-shm-usage "$@"
          EOF
          chmod +x /tmp/chrome-no-sandbox
          echo "CHROME_BIN=/tmp/chrome-no-sandbox" >> "$GITHUB_ENV"

      - name: Run CI checks
        env:
          CHROME_BIN: ${{ env.CHROME_BIN }}
        run: npm run ci:check
