services:
  postgres:
    image: postgres:16-alpine
    container_name: api-test-postgres
    environment:
      POSTGRES_DB: api_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - api_test_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d api_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-test-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/api_test?schema=public
      FRONT_URL: http://localhost:4200,http://localhost:4201,http://localhost:4202
      ACCESS_TOKEN_SECRET: change-me-access
      REFRESH_TOKEN_SECRET: change-me-refresh
      ACCESS_TOKEN_EXPIRE: 15m
      REFRESH_TOKEN_EXPIRE: 7d
      EMAIL_VERIFICATION_EXPIRE: 24h
      ENABLE_AUDIT_LOG: "false"
      REGISTRATION_ENABLED: "true"
      EMAIL_VERIFICATION_REQUIRED: "true"
      REGISTRATION_CAPTCHA_REQUIRED: "false"
      COOKIE_DOMAIN: localhost
      VERIFY_EMAIL_URL: http://localhost:4200/verify-email
    ports:
      - "3000:3000"

volumes:
  api_test_pgdata:


