<router-outlet></router-outlet>

@if (toast.visible()) {
  <div class="app-toast-container">
    <div class="app-toast" role="status" aria-live="polite" aria-atomic="true">
      <div class="app-toast-header">
        <strong class="app-toast-title">Notification</strong>
        <button
          type="button"
          class="app-toast-close"
          (click)="toast.hide()"
          aria-label="Close"
        >
          X
        </button>
      </div>
      <div class="app-toast-body">{{ toast.message() }}</div>
    </div>
  </div>
}
