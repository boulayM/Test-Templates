<section class="profile">
  <p class="section-kicker">Compte client</p>
  <h1>Mon compte</h1>

  @if (user()) {
    <div class="card profile-card">
      <dl>
        <div>
          <dt>Prenom</dt>
          <dd>{{ user()!.firstName }}</dd>
        </div>
        <div>
          <dt>Nom</dt>
          <dd>{{ user()!.lastName }}</dd>
        </div>
        <div>
          <dt>Email</dt>
          <dd>{{ user()!.email }}</dd>
        </div>
        <div>
          <dt>Etat du compte</dt>
          <dd>Client actif</dd>
        </div>
      </dl>
    </div>
    <p class="profile-note">
      Les operations d edition du profil ne sont pas disponibles sur cette demo.
    </p>
  } @else {
    <div class="alert alert-warning">
      Connexion requise pour acceder au profil.
    </div>
  }
</section>
