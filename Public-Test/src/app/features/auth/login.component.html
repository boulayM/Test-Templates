<div class="container container-sm auth-container" [class.auth-container--embedded]="embedded">
  <div class="auth-card">
    <h2>Connexion</h2>

    <form class="form-layout auth-form" [formGroup]="form" (ngSubmit)="submit()">
      <app-form-alert
        [visible]="hasError()"
        title="Erreur de validation"
        [message]="error() || ''"
        [items]="alertItems()"
      ></app-form-alert>

      <div class="auth-field">
        <label class="form-label" for="loginEmail">Email</label>
        <input id="loginEmail" type="email" formControlName="email" class="form-control" required />
      </div>

      <div class="auth-field">
        <label class="form-label" for="loginPassword">Mot de passe</label>
        <input id="loginPassword" type="password" formControlName="password" class="form-control" required />
      </div>

      <button type="submit" class="btn btn-dark auth-submit" [disabled]="loading()">
        {{ loading() ? 'Connexion...' : 'Connexion' }}
      </button>
    </form>

    <p class="login-register-link">
      Pas de compte ?
      <a routerLink="/register">Creer un compte</a>
    </p>
  </div>
</div>
