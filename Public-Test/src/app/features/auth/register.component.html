<div class="container container-sm auth-container">
  <div class="auth-card">
    <h2>Inscription</h2>

    <form class="auth-form" [formGroup]="form" autocomplete="off">
      <app-form-alert
        [visible]="hasError()"
        title="Demo"
        message="Le formulaire est present mais volontairement desactive."
        [items]="alertItems()"
      ></app-form-alert>

      <div class="auth-field">
        <label class="form-label" for="registerFirstName">Prenom</label>
        <input id="registerFirstName" type="text" formControlName="firstName" class="form-control" />
      </div>

      <div class="auth-field">
        <label class="form-label" for="registerLastName">Nom</label>
        <input id="registerLastName" type="text" formControlName="lastName" class="form-control" />
      </div>

      <div class="auth-field">
        <label class="form-label" for="registerEmail">Email</label>
        <input id="registerEmail" type="email" formControlName="email" class="form-control" />
      </div>

      <div class="auth-field">
        <label class="form-label" for="registerPassword">Mot de passe</label>
        <input id="registerPassword" type="password" formControlName="password" class="form-control" />
      </div>

      <button type="button" class="btn btn-outline-dark auth-submit" disabled>Creer un compte</button>
    </form>

    <p class="login-register-link">
      <a routerLink="/home">Retour a l accueil</a>
    </p>
  </div>
</div>
