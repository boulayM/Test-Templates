@if (visible) {
  <div
    class="form-alert"
    role="alert"
    aria-live="assertive"
    aria-atomic="true"
    [attr.aria-labelledby]="headingId"
  >
    <div class="form-alert-title" [id]="headingId">{{ title }}</div>
    @if (message) {
      <div class="form-alert-message">{{ message }}</div>
    }
    @if (items.length > 0) {
      <ul class="form-alert-list">
        @for (item of items; track item) {
          <li>{{ item }}</li>
        }
      </ul>
    }
  </div>
}
